          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-VWZEG9L8Z2', {
            page_title: document.title,
            page_location: window.location.href,
            anonymize_ip: true

      });

    </script>
