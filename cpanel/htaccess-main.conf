# ================================
# Ground Protection - Main .htaccess
# ================================
# هذا الملف يُوضع في public_html/ على cPanel
# يوجه طلبات API إلى Laravel backend
# ويوجه باقي الطلبات إلى React SPA
# ================================

# حماية ملفات البيئة
<Files ".env">
    Order allow,deny
    Deny from all
</Files>

# إخفاء معلومات الخادم
<IfModule mod_headers.c>
    Header unset X-Powered-By
    Header unset Server
    Header set X-Content-Type-Options "nosniff"
    Header set X-Frame-Options "DENY"
    Header set X-XSS-Protection "1; mode=block"
    Header set Referrer-Policy "strict-origin-when-cross-origin"
</IfModule>

# تعطيل عرض محتوى المجلدات
Options -Indexes

<IfModule mod_rewrite.c>
    Options -MultiViews
    RewriteEngine On

    # ================================
    # 1. إعادة التوجيه إلى HTTPS
    # ================================
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]

    # ================================
    # 2. توجيه طلبات API إلى Laravel Backend
    # ================================
    # جميع طلبات /api/* تذهب إلى api/public/index.php
    RewriteCond %{REQUEST_URI} ^/api(/.*)?$
    RewriteRule ^api(/.*)?$ api/public/index.php [QSA,L]

    # ================================
    # 3. توجيه Filament Admin Panel إلى Laravel
    # ================================
    # طلبات /admin/* تذهب إلى Laravel أيضاً
    RewriteCond %{REQUEST_URI} ^/admin(/.*)?$
    RewriteRule ^admin(/.*)?$ api/public/index.php [QSA,L]

    # ================================
    # 4. توجيه Laravel Sanctum CSRF Cookie
    # ================================
    RewriteRule ^sanctum/(.*)$ api/public/index.php [QSA,L]

    # ================================
    # 5. توجيه ملفات Laravel Storage/Assets
    # ================================
    RewriteRule ^storage/(.*)$ api/public/storage/$1 [QSA,L]

    # ================================
    # 6. خدمة الملفات الموجودة فعلياً (Assets, Images, etc.)
    # ================================
    RewriteCond %{REQUEST_FILENAME} -f [OR]
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteRule ^ - [L]

    # ================================
    # 7. React SPA Fallback
    # ================================
    # أي طلب لا يطابق ملف أو مجلد يذهب إلى index.html
    RewriteRule ^ index.html [L]
</IfModule>

# ================================
# خدمة الملفات المضغوطة مسبقاً (Vite gzip output)
# ================================
<IfModule mod_mime.c>
    AddEncoding gzip .gz
    AddEncoding br .br
    AddType application/javascript .js
    AddType text/css .css
</IfModule>

<IfModule mod_rewrite.c>
    # خدمة ملفات Brotli المضغوطة (.br) إذا كانت موجودة
    RewriteCond %{HTTP:Accept-Encoding} br
    RewriteCond %{REQUEST_FILENAME}.br -f
    RewriteRule ^(.+\.(js|css))$ $1.br [QSA,E=no-gzip:1]

    # خدمة ملفات Gzip المضغوطة (.gz) كبديل
    RewriteCond %{REQUEST_FILENAME}.gz -f
    RewriteRule ^(.+\.(js|css))$ $1.gz [QSA]
</IfModule>

<IfModule mod_headers.c>
    # ضبط ترويسة الضغط للملفات المضغوطة
    <FilesMatch "\.(js|css)\.br$">
        Header set Content-Encoding br
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <FilesMatch "\.(js|css)\.gz$">
        Header set Content-Encoding gzip
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <FilesMatch "\.(js|css)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
</IfModule>

# ================================
# Gzip Compression للمحتوى الديناميكي
# ================================
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/css text/xml
    AddOutputFilterByType DEFLATE text/javascript application/javascript
    AddOutputFilterByType DEFLATE application/json application/ld+json
    AddOutputFilterByType DEFLATE application/xml application/rss+xml
    AddOutputFilterByType DEFLATE image/svg+xml
</IfModule>
