# ================================
# ⚡ Performance & Caching Configuration
# Ground Tech - Optimized for Core Web Vitals (2025)
# ================================

# ================================
# 1. COMPRESSION (Brotli preferred, Gzip fallback)
# ================================

# Brotli compression (best, ~20% smaller than gzip)
<IfModule mod_brotli.c>
  AddOutputFilterByType BROTLI_COMPRESS text/html text/plain text/css text/xml
  AddOutputFilterByType BROTLI_COMPRESS text/javascript application/javascript application/x-javascript
  AddOutputFilterByType BROTLI_COMPRESS application/json application/ld+json
  AddOutputFilterByType BROTLI_COMPRESS application/xml application/rss+xml
  AddOutputFilterByType BROTLI_COMPRESS image/svg+xml
  AddOutputFilterByType BROTLI_COMPRESS font/woff2 font/woff font/ttf
  
  # Compression level (0-11, higher = better compression but slower)
  BrotliCompressionQuality 6
</IfModule>

# Gzip fallback
<IfModule mod_deflate.c>
  AddOutputFilterByType DEFLATE text/html text/plain text/css text/xml
  AddOutputFilterByType DEFLATE text/javascript application/javascript application/x-javascript
  AddOutputFilterByType DEFLATE application/json application/ld+json
  AddOutputFilterByType DEFLATE application/xml application/rss+xml
  AddOutputFilterByType DEFLATE image/svg+xml
  AddOutputFilterByType DEFLATE font/woff font/ttf
  
  # Don't compress already compressed formats
  SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|webp|avif)$ no-gzip
  SetEnvIfNoCase Request_URI \.(?:exe|t?gz|zip|bz2|sit|rar)$ no-gzip
  SetEnvIfNoCase Request_URI \.pdf$ no-gzip
  SetEnvIfNoCase Request_URI \.avi$ no-gzip
  SetEnvIfNoCase Request_URI \.mov$ no-gzip
  SetEnvIfNoCase Request_URI \.mp3$ no-gzip
  SetEnvIfNoCase Request_URI \.mp4$ no-gzip
  SetEnvIfNoCase Request_URI \.rm$ no-gzip
</IfModule>

# ================================
# 2. SERVE PRE-COMPRESSED ASSETS
# ================================

<IfModule mod_mime.c>
  # Add encoding types
  AddEncoding br .br
  AddEncoding gzip .gz
  
  # MIME types
  AddType text/javascript .js
  AddType text/css .css
  AddType application/json .json
  AddType image/avif .avif
  AddType image/webp .webp
  AddType image/svg+xml .svg
  AddType font/woff2 .woff2
  AddType font/woff .woff
</IfModule>

<IfModule mod_rewrite.c>
  RewriteEngine On
  
  # Serve Brotli if available and accepted
  RewriteCond %{HTTP:Accept-Encoding} br
  RewriteCond %{REQUEST_FILENAME}.br -f
  RewriteRule ^(.+)\.(js|css)$ $1.$2.br [QSA,E=CONTENT_ENCODING:br]
  
  # Serve Gzip if Brotli not available
  RewriteCond %{HTTP:Accept-Encoding} gzip
  RewriteCond %{REQUEST_FILENAME}.gz -f
  RewriteCond %{REQUEST_FILENAME}.br !-f
  RewriteRule ^(.+)\.(js|css)$ $1.$2.gz [QSA,E=CONTENT_ENCODING:gzip]
</IfModule>

<IfModule mod_headers.c>
  # Set encoding header for pre-compressed files
  <FilesMatch "\.(js|css)\.br$">
    Header set Content-Encoding br
    Header set Vary "Accept-Encoding"
  </FilesMatch>
  <FilesMatch "\.(js|css)\.gz$">
    Header set Content-Encoding gzip
    Header set Vary "Accept-Encoding"
  </FilesMatch>
</IfModule>

# ================================
# 3. CACHE CONTROL (Long-term caching)
# ================================

<IfModule mod_headers.c>
  # ⚡ Images: 1 year cache (immutable - content-hashed)
  <FilesMatch "\.(avif|webp|png|jpg|jpeg|gif|ico|svg)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
  </FilesMatch>
  
  # ⚡ Fonts: 1 year cache (rarely change)
  <FilesMatch "\.(woff2|woff|ttf|otf|eot)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
  </FilesMatch>
  
  # ⚡ CSS/JS: 1 year cache (content-hashed by Vite)
  <FilesMatch "\.(css|js)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
  </FilesMatch>
  
  # ⚡ HTML: Short cache for freshness (5 minutes)
  <FilesMatch "\.html$">
    Header set Cache-Control "public, max-age=300, must-revalidate"
  </FilesMatch>
  
  # ⚡ JSON/XML: Short cache
  <FilesMatch "\.(json|xml)$">
    Header set Cache-Control "public, max-age=3600, must-revalidate"
  </FilesMatch>
  
  # ⚡ Manifest & Service Worker: No cache (always fresh)
  <FilesMatch "(manifest\.json|sw\.js)$">
    Header set Cache-Control "no-cache, no-store, must-revalidate"
  </FilesMatch>
</IfModule>

# ================================
# 4. EXPIRES HEADERS (Fallback)
# ================================

<IfModule mod_expires.c>
  ExpiresActive On
  ExpiresDefault "access plus 1 month"
  
  # Images
  ExpiresByType image/avif "access plus 1 year"
  ExpiresByType image/webp "access plus 1 year"
  ExpiresByType image/png "access plus 1 year"
  ExpiresByType image/jpeg "access plus 1 year"
  ExpiresByType image/gif "access plus 1 year"
  ExpiresByType image/svg+xml "access plus 1 year"
  ExpiresByType image/x-icon "access plus 1 year"
  
  # Fonts
  ExpiresByType font/woff2 "access plus 1 year"
  ExpiresByType font/woff "access plus 1 year"
  ExpiresByType font/ttf "access plus 1 year"
  ExpiresByType application/font-woff2 "access plus 1 year"
  
  # CSS/JS
  ExpiresByType text/css "access plus 1 year"
  ExpiresByType text/javascript "access plus 1 year"
  ExpiresByType application/javascript "access plus 1 year"
  
  # HTML
  ExpiresByType text/html "access plus 5 minutes"
  
  # Data
  ExpiresByType application/json "access plus 1 hour"
  ExpiresByType application/xml "access plus 1 hour"
</IfModule>

# ================================
# 5. SECURITY HEADERS
# ================================

<IfModule mod_headers.c>
  # Prevent MIME type sniffing
  Header always set X-Content-Type-Options "nosniff"
  
  # XSS Protection
  Header always set X-XSS-Protection "1; mode=block"
  
  # Clickjacking protection
  Header always set X-Frame-Options "SAMEORIGIN"
  
  # Referrer Policy
  Header always set Referrer-Policy "strict-origin-when-cross-origin"
  
  # Permissions Policy (disable unused features)
  Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()"
</IfModule>

# ================================
# 6. PERFORMANCE OPTIMIZATIONS
# ================================

# Disable ETags (use Cache-Control instead)
<IfModule mod_headers.c>
  Header unset ETag
</IfModule>
FileETag None

# Keep connections alive
<IfModule mod_headers.c>
  Header set Connection keep-alive
</IfModule>

# ================================
# 7. SPA ROUTING (React Router)
# ================================

<IfModule mod_rewrite.c>
  RewriteEngine On
  RewriteBase /
  
  # Don't rewrite files or directories
  RewriteCond %{REQUEST_FILENAME} -f [OR]
  RewriteCond %{REQUEST_FILENAME} -d
  RewriteRule ^ - [L]
  
  # Rewrite everything else to index.html for SPA
  RewriteRule ^ index.html [L]
</IfModule>
